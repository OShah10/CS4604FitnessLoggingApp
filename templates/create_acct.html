<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create an Account</title>
</head>
<body>
<form action="/add_acct" method="post">
    <input type="text" name = "fname" placeholder="Enter first name">
    <input type="text" name="lname" placeholder="Enter last name">
    <select id = "sex" name="sex" size="2">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        
    </select>
    <input type="number" name="height" placeholder="Enter height in cm">
    <input type="number" name="weight" placeholder="Enter weight">
    <input type="text" name="email" placeholder="Enter email address">
    <input type ="date" name = "birthday" placeholder="Enter Date of Birth">
    <input type = "submit" value="Submit">
</form>

</body>
</html>

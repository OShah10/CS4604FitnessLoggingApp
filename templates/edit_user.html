<!DOCTYPE html>
<html lang="en">

<head>
    <title>Edit User Info</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1 {
            color: #333;
        }
        form {
            max-width: 400px;
        }
        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 6px;
            margin-top: 4px;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        a {
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>Edit User Info</h1>

    <form action="{{ url_for('update_user', userid=uid) }}" method="POST">
        <label for="fname">First Name</label>
        <input type="text" id="fname" name="fname" value="{{ user_info.Fname }}" required>

        <label for="lname">Last Name</label>
        <input type="text" id="lname" name="lname" value="{{ user_info.Lname }}" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ user_info.Email }}" required>

        <label for="birthdate">Birthdate</label>
        <input type="date" id="birthdate" name="birthdate" value="{{ user_info.Birthdate }}" required>

        <label for="height">Height</label>
        <input type="number" step="0.01" id="height" name="height" value="{{ user_info.Height }}" required>

        <label for="weight">Weight</label>
        <input type="number" step="0.01" id="weight" name="weight" value="{{ user_info.Weight }}" required>

        <label for="privilege">Privilege</label>
        <select id="privilege" name="privilege">
            <option value="u" {% if user_info.Privilege == 'u' %}selected{% endif %}>User</option>
            <option value="a" {% if user_info.Privilege == 'a' %}selected{% endif %}>Admin</option>
        </select>

        <button type="submit">Save Changes</button>
    </form>

    <a href="{{ url_for('user', userid=uid) }}">Back to Profile</a>

</body>
</html>

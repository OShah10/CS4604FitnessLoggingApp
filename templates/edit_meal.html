<!DOCTYPE html>
<html lang="en">

<head>
    <title>Edit Meal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1 {
            color: #333;
        }
        form {
            max-width: 400px;
        }
        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 6px;
            margin-top: 4px;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        a {
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>Edit Meal</h1>

    <form action="{{ url_for('update_meal', foodid=meal.FoodID) }}" method="POST">
        <label for="name">Meal Name</label>
        <input type="text" id="name" name="name" value="{{ meal.Name }}" required>

        <label for="calories">Calories</label>
        <input type="number" id="calories" name="calories" min="0" value="{{ meal.Calories }}" required>

        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="3">{{ meal.Notes }}</textarea>

        <button type="submit">Save Changes</button>
    </form>

    <a href="{{ url_for('user', userid=meal.UserID) }}">Back to Profile</a>

</body>
</html>

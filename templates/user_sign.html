<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <title>Sign in</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1, h2 {
            color: #333;
        }
        .error-mesage {
            color:crimson;
        }
    </style>
</head>
<body>
    <h1>Sign In</h1>
    
    <form method="post">
        <fieldset>
            <legend>Please enter Email or User ID:</legend>
            <label for ="email">Email Address</label><br>
            <input type="text" name="email" placeholder="Enter email address"><br>
            <input type = "number" name = "user_id" placeholder="Enter User ID"><br>
            <input type = "submit" value="Submit">

        </fieldset><br>
        
    </form>
    <div style="margin-top: 10px;">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p class="error-mesage">{{ message }}</p>
            {% endfor %}
        {% endif %}
        {% endwith %}
    </div>
</body>
</html>

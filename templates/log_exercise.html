<!DOCTYPE html>
<html lang="en">

<head>
    <title>Log an Exercise</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1 {
            color: #333;
        }
        form {
            max-width: 400px;
        }
        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 6px;
            margin-top: 4px;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        a {
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>Log an Exercise</h1>

    <form action="{{ url_for('add_exercise', userid=uid) }}" method="POST">
        <label for="name">Exercise Name</label>
        <input type="text" id="name" name="name" required>

        <label for="calories_burned">Calories Burned</label>
        <input type="number" id="calories_burned" name="calories_burned" min="0" required>

        <label for="duration">Duration (HH:MM:SS)</label>
        <input type="text" id="duration" name="duration" placeholder="00:30:00" pattern="[0-9]{2}:[0-9]{2}:[0-9]{2}" required>

        <label for="effort_rating">Effort Rating (1-10)</label>
        <input type="number" id="effort_rating" name="effort_rating" min="1" max="10" required>

        <label for="done">Completed?</label>
        <select id="done" name="done">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="3"></textarea>

        <button type="submit">Submit Exercise</button>
    </form>

    <a href="{{ url_for('user', userid=uid) }}">Back to Profile</a>

</body>
</html>
